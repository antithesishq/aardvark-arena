x-auth-token: &auth-token
  AUTH_TOKEN: d4f5a1b2-0e3c-4a6d-9f8b-7c2e1d3a5b6f

services:
  matchmaker:
    build: .
    command:
      - sh
      - -c
      - matchmaker -addr=:8080 -key=$$AUTH_TOKEN -gameserver=http://gameserver:8081
    environment:
      <<: *auth-token

  gameserver:
    build: .
    command:
      - sh
      - -c
      - gameserver -addr=:8081 -token=$$AUTH_TOKEN -matchmaker=http://matchmaker:8080
    environment:
      <<: *auth-token
    depends_on:
      - matchmaker
    deploy:
      replicas: 3

  player:
    build: .
    command:
      - sh
      - -c
      - player -matchmaker=http://matchmaker:8080
    depends_on:
      - matchmaker
      - gameserver
    deploy:
      replicas: 4
