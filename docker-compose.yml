x-auth-token: &auth-token
  AUTH_TOKEN: d4f5a1b2-0e3c-4a6d-9f8b-7c2e1d3a5b6f

x-gameserver: &gameserver
  build: .
  environment:
    <<: *auth-token
  depends_on:
    - matchmaker

services:
  matchmaker:
    build: .
    command:
      - sh
      - -c
      - >-
        matchmaker -addr=:8080 -key=$$AUTH_TOKEN
        -gameserver=http://gameserver-1:8081
        -gameserver=http://gameserver-2:8081
        -gameserver=http://gameserver-3:8081
    environment:
      <<: *auth-token

  gameserver-1:
    <<: *gameserver
    command:
      - sh
      - -c
      - gameserver -addr=:8081 -token=$$AUTH_TOKEN -matchmaker=http://matchmaker:8080

  gameserver-2:
    <<: *gameserver
    command:
      - sh
      - -c
      - gameserver -addr=:8081 -token=$$AUTH_TOKEN -matchmaker=http://matchmaker:8080

  gameserver-3:
    <<: *gameserver
    command:
      - sh
      - -c
      - gameserver -addr=:8081 -token=$$AUTH_TOKEN -matchmaker=http://matchmaker:8080

  player:
    build: .
    command:
      - sh
      - -c
      - player -matchmaker=http://matchmaker:8080 -num-sessions 10
    depends_on:
      - matchmaker
      - gameserver-1
      - gameserver-2
      - gameserver-3
    deploy:
      replicas: 4
