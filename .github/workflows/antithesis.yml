name: Antithesis

on:
  pull_request:
    branches: [main]

jobs:
  antithesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Antithesis registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.ANTITHESIS_GAR_KEY }}

      - name: Build and push images
        env:
          REGISTRY: us-central1-docker.pkg.dev/molten-verve-216720/honey-whale
        run: |
          docker build --platform linux/amd64 -f antithesis/Dockerfile --target service  -t "$REGISTRY/aardvark-arena-service:${{ github.sha }}"  .
          docker build --platform linux/amd64 -f antithesis/Dockerfile --target player  -t "$REGISTRY/aardvark-arena-player:${{ github.sha }}"  .
          docker build --platform linux/amd64 -f antithesis/Dockerfile --target health-checker -t "$REGISTRY/aardvark-arena-health-checker:${{ github.sha }}" .
          docker build --platform linux/amd64 -f antithesis/Dockerfile --target config  -t "$REGISTRY/aardvark-arena-config:${{ github.sha }}"  .
          docker push "$REGISTRY/aardvark-arena-service:${{ github.sha }}"
          docker push "$REGISTRY/aardvark-arena-player:${{ github.sha }}"
          docker push "$REGISTRY/aardvark-arena-health-checker:${{ github.sha }}"
          docker push "$REGISTRY/aardvark-arena-config:${{ github.sha }}"

      - uses: antithesishq/antithesis-trigger-action@v0.8
        with:
          notebook_name: basic_test
          tenant: honey-whale
          username: ${{ secrets.ANTITHESIS_USERNAME }}
          password: ${{ secrets.ANTITHESIS_PASSWORD }}
          github_token: ${{ secrets.GH_PAT }}
          config_image: us-central1-docker.pkg.dev/molten-verve-216720/honey-whale/aardvark-arena-config:${{ github.sha }}
          images: >-
            us-central1-docker.pkg.dev/molten-verve-216720/honey-whale/aardvark-arena-service:${{ github.sha }};
            us-central1-docker.pkg.dev/molten-verve-216720/honey-whale/aardvark-arena-player:${{ github.sha }};
            us-central1-docker.pkg.dev/molten-verve-216720/honey-whale/aardvark-arena-health-checker:${{ github.sha }}
          description: "aardvark-arena"
          email_recipients: alex.carcoana@antithesis.com
          duration_minutes: "15"
