name: aardvark-arena

services:
  matchmaker:
    container_name: aardvark-arena-matchmaker
    hostname: aardvark-arena-matchmaker
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: antithesis/Dockerfile
      target: matchmaker
    image: aardvark-arena-matchmaker:latest
    environment:
      NO_COLOR: "1"
    command:
      - "-addr=:8080"
      - "-db-path=/data/matchmaker.db"
      - "-match-interval=100ms"
      - "-session-timeout=2m"
      - "-monitor-interval=1s"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 2s
      timeout: 2s
      retries: 10

  gameserver:
    container_name: aardvark-arena-gameserver
    hostname: aardvark-arena-gameserver
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: antithesis/Dockerfile
      target: gameserver
    image: aardvark-arena-gameserver:latest
    environment:
      NO_COLOR: "1"
    command:
      - "-addr=:8081"
      - "-self-url=http://aardvark-arena-gameserver:8081"
      - "-matchmaker=http://aardvark-arena-matchmaker:8080"
      - "-turn-timeout=10s"
      - "-max-sessions=6"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 2s
      timeout: 2s
      retries: 10

  gameserver-2:
    container_name: aardvark-arena-gameserver-2
    hostname: aardvark-arena-gameserver-2
    platform: linux/amd64
    image: aardvark-arena-gameserver:latest
    environment:
      NO_COLOR: "1"
    command:
      - "-addr=:8081"
      - "-self-url=http://aardvark-arena-gameserver-2:8081"
      - "-matchmaker=http://aardvark-arena-matchmaker:8080"
      - "-turn-timeout=10s"
      - "-max-sessions=6"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 2s
      timeout: 2s
      retries: 10

  workload-1:
    container_name: aardvark-arena-workload-1
    hostname: aardvark-arena-workload-1
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: antithesis/Dockerfile
      target: workload
    image: aardvark-arena-workload:latest
    environment:
      NO_COLOR: "1"
    depends_on:
      matchmaker:
        condition: service_healthy
      gameserver:
        condition: service_healthy
      gameserver-2:
        condition: service_healthy

  workload-2:
    container_name: aardvark-arena-workload-2
    hostname: aardvark-arena-workload-2
    platform: linux/amd64
    image: aardvark-arena-workload:latest
    environment:
      NO_COLOR: "1"
    depends_on:
      matchmaker:
        condition: service_healthy
      gameserver:
        condition: service_healthy
      gameserver-2:
        condition: service_healthy
